<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planeten Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="../index.html" class="back-btn">← Terug naar Portfolio</a>

<main class="page">

  <section class="intro">
    <h1>Planeten Quiz</h1>
    <p>Test je kennis over planeten en ons zonnestelsel.</p>
  </section>

  <section class="quiz-card">

    <div class="quiz-top">
      <span id="questionNumber">Vraag 1 van 10</span>
      <span id="score">Score: 0</span>
    </div>

    <h2 id="question">Vraag komt hier...</h2>

    <div id="answers" class="answers"></div>

    <button id="nextBtn" class="next-btn">Volgende vraag</button>

    <div id="result" class="result"></div>

  </section>

</main>

<script src="main.js"></script>
</body>
</html>
